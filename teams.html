  <script>
    const AUTH_SERVER = "https://discord-auth-server-six.vercel.app";
    const AUTH_TOKEN_KEY = "sg-discord-token";
    const AUTH_USER_KEY = "sg-discord-user";
    const GOOGLE_SCRIPT_URL = "https://dcrhwrcdpcnzqtxhqgwb.supabase.co/functions/v1/api";
    const IS_LOCAL_MODE = ["localhost", "127.0.0.1"].includes(window.location.hostname) || window.location.protocol === "file:";
    const LOCAL_USER = {
      id: "local-dev-user",
      username: "LocalDev",
      global_name: "Local Dev",
      name: "Local Dev",
      avatar: ""
    };

    function readStoredAuthToken() {
      try {
        return localStorage.getItem(AUTH_TOKEN_KEY) || "";
      } catch (error) {
        console.warn("Unable to read auth token", error);
        return "";
      }
    }

    function persistAuthUser(user) {
      try {
        if (user) {
          localStorage.setItem(AUTH_USER_KEY, JSON.stringify(user));
        } else {
          localStorage.removeItem(AUTH_USER_KEY);
        }
      } catch (error) {
        console.warn("Unable to persist auth user", error);
      }
    }

    function clearStoredAuth() {
      try {
        localStorage.removeItem(AUTH_TOKEN_KEY);
        localStorage.removeItem(AUTH_USER_KEY);
      } catch (error) {
        console.warn("Unable to clear auth storage", error);
      }
    }

    function buildAuthHeaders() {
      const token = readStoredAuthToken();
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    window.__authPromise = IS_LOCAL_MODE ? Promise.resolve(LOCAL_USER) : fetch(`${AUTH_SERVER}/me`, {
      credentials: "include",
      headers: buildAuthHeaders()
    })
    .then(async (res) => {
      if (IS_LOCAL_MODE) {
        return res;
      }

      if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
          clearStoredAuth();
        }
        throw new Error("Unauthorized");
      }

      return await res.json();
    })
    .then((user) => {
      window.__authUser = user;
      persistAuthUser(user);
      if (IS_LOCAL_MODE) {
        document.body.style.visibility = "visible";
      }
      return user;
    })
    .catch((err) => {
      console.error("Auth error:", err);
      if (IS_LOCAL_MODE) {
        document.body.style.visibility = "visible";
        return LOCAL_USER;
      }
      clearStoredAuth();
      window.__authUser = null;
      document.body.style.visibility = "visible";
      return null;
    })
    .catch(() => {
      document.body.style.visibility = "visible"; // на всякий случай
      return null;
    });
  </script>

        grid-template-columns: 1fr;

    .player-top{
        flex-wrap: wrap;

    .badge-captain{
        margin-left: 90px;
    }

    .player-name{
        font-size: 1.5rem;
    }

    /* ===== SCROLL ===== */
    html[data-theme="original"] .player-avatar,
    html[data-theme="dark"] .player-avatar{

    html[data-theme="original"] .top-nav .text-white\/80,

    html[data-theme="original"] header p.text-\[\#ff6f91\],
    html[data-theme="dark"] header p.text-\[\#ff6f91\]{

    ::-webkit-scrollbar{
    height: 10px;
    width: 10px;

    ::-webkit-scrollbar-track{
    background: var(--scrollbar-track);
    }

    ::-webkit-scrollbar-thumb{
    background: var(--scrollbar-thumb);
    border-radius: 999px;
    }

<body class="font-sans min-h-screen">

  <!-- TOURNAMENT HEADER -->
  <header class="teams-hero text-center py-16">
    <div class="teams-hero-panel">
      <span class="teams-hero-chip">SUMMER BREAKOUT</span>
      <h1 class="teams-hero-title mt-6">
        <span class="theme-accent-text theme-title-glow">TEAMS</span>
      </h1>
      <div class="h-1 w-28 mx-auto mt-5 rounded-full glow"
          style="background: rgb(var(--accent-rgb));">
      </div>

        Tournament squads, captains and full lineups in one place.
      </p>
    </div>
  </header>

  <main class="max-w-[1800px] mx-auto px-6 pb-16">
    <div id="teamsContainer" class="space-y-16"></div>
  </main>

  <footer class="text-center py-12 mt-10 border-t border-white/5 text-[10px] tracking-[0.4em] uppercase" style="color: var(--footer-color);">
    © 2026 SG TOURNAMENT №4<span class="mx-3 opacity-20">|</span> SECRET GATE CORP.
  </footer>

  <script>
    (function () {
      const teamsContainer = document.getElementById("teamsContainer");

      if (!teamsContainer) {
        return;
      }

      const DEFAULT_PLAYER_STATS = {
        rating: "0.00",
        playtime: "??? hrs",
        favWeapon: "???"
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalizePlayerName(value) {
        return String(value ?? "")
          .normalize("NFKD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^0-9a-zа-яё]+/gi, "")
          .toLowerCase();
      }

      function buildTeamKey(value) {
        return String(value ?? "")
          .trim()
          .replace(/[^0-9a-z]+/gi, "")
          .toUpperCase();
      }

      function formatRating(value) {
        if (value === null || value === undefined || value === "") {
          return DEFAULT_PLAYER_STATS.rating;
        }

        const numericValue = Number(value);
        if (Number.isFinite(numericValue)) {
          return numericValue.toFixed(2);
        }

        const normalizedValue = String(value).trim();
        return normalizedValue || DEFAULT_PLAYER_STATS.rating;
      }

      async function fetchJson(url) {
        const response = await fetch(url, { method: "GET" });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        return await response.json();
      }

      async function loadRatingsByPlayer() {
        const data = await fetchJson(`${GOOGLE_SCRIPT_URL}?mode=ratings`);
        if (data?.status === "error") {
          throw new Error(data.error || "Failed to load ratings");
        }
        const rows = Array.isArray(data?.ratings) ? data.ratings : [];

        return rows.reduce((accumulator, row) => {
          const playerName = normalizePlayerName(row?.player);

          if (!playerName) {
            return accumulator;
          }

          accumulator[playerName] = formatRating(row?.average_rating);
          return accumulator;
        }, {});
      }

      async function loadTeamsFromApi() {
        const data = await fetchJson(`${GOOGLE_SCRIPT_URL}?mode=teams`);
        if (data?.status === "error") {
          throw new Error(data.error || "Failed to load teams");
        }

        const rows = Array.isArray(data?.teams) ? data.teams : [];

        return rows.map((team) => ({
          key: buildTeamKey(team?.slug || team?.name),
          name: String(team?.name || "").trim() || "Unknown Team",
          logo: String(team?.logo_url || "").trim(),
          players: Array.isArray(team?.players)
            ? team.players.map((player) => ({
              name: String(player?.display_name || "").trim() || "Unknown Player",
              image: String(player?.image_url || "").trim(),
              role: String(player?.role || "").trim(),
              playtime: String(player?.playtime || "").trim(),
              favWeapon: String(player?.fav_weapon || "").trim(),
              captain: Boolean(player?.is_captain),
              rating: DEFAULT_PLAYER_STATS.rating
            }))
            : []
        }));
      }

      function applyRatingsToTeams(teams, ratingsByPlayer) {
        return teams.map((team) => ({
          ...team,
          players: team.players.map((player) => ({
            ...player,
            rating: ratingsByPlayer[normalizePlayerName(player.name)] || DEFAULT_PLAYER_STATS.rating
          }))
        }));
      }

      function getCaptainName(team) {
        const captain = team.players.find((player) => player.captain);
        return captain?.name || "Not assigned";
      }

      function calculateAverageRating(team) {
        const numericRatings = team.players
          .map((player) => Number(player.rating))
          .filter((rating) => Number.isFinite(rating));

        if (!numericRatings.length) {
          return DEFAULT_PLAYER_STATS.rating;
        }

        const total = numericRatings.reduce((sum, rating) => sum + rating, 0);
        return (total / numericRatings.length).toFixed(2);
      }

      function renderPlayerCard(team, player, playerIndex) {
        const animationDelay = `${(playerIndex * 0.12).toFixed(2)}s`;
        const imageSrc = escapeHtml(player.image || team.logo || "images/icon.png");
        const fallbackImage = escapeHtml(team.logo || "images/icon.png");
        const teamBadge = escapeHtml(team.logo || "images/icon.png");
        const playerKey = escapeHtml(normalizePlayerName(player.name));
        const playerName = escapeHtml(player.name);
        const role = escapeHtml(player.role || "Player");
        const rating = escapeHtml(player.rating || DEFAULT_PLAYER_STATS.rating);
        const playtime = escapeHtml(player.playtime || DEFAULT_PLAYER_STATS.playtime);
        const favWeaponValue = player.favWeapon || DEFAULT_PLAYER_STATS.favWeapon;
        const favWeapon = escapeHtml(favWeaponValue);
        const playerNote = player.captain
          ? "Captain of the roster"
          : `Favorite weapon: ${favWeaponValue}`;

        return `
          <article class="player-card animate__animated animate__fadeInUp${player.captain ? " captain-ring" : ""}" style="animation-delay: ${animationDelay};">
            <div class="player-top">
              <div class="player-avatar-shell">
                <img src="${imageSrc}" alt="${playerName}" class="player-avatar" onerror="this.onerror=null;this.src='${fallbackImage}';">
                <span class="player-team-badge">
                  <img src="${teamBadge}" alt="${escapeHtml(team.name)} logo" onerror="this.onerror=null;this.src='images/icon.png';">
                </span>
              </div>
              <div class="player-copy">
                <span class="player-role">${role}</span>
                <h3 class="player-name">${playerName}</h3>
                
              </div>
              ${player.captain ? '<span class="badge-captain">Captain</span>' : ""}
            </div>
            <div class="player-stats">
              <div class="stat-badge">
                <span class="stat-label">Average K/D</span>
                <span class="stat-value" data-player-rating="${playerKey}">${rating}</span>
              </div>
              <div class="stat-badge">
                <span class="stat-label">Playtime</span>
                <span class="stat-value">${playtime}</span>
              </div>
              <div class="stat-badge">
                <span class="stat-label">Favorite Weapon</span>
                <span class="stat-value">${favWeapon}</span>
              </div>
            </div>
          </article>
        `;
      }

      function renderTeamSection(team, teamIndex) {
        const teamNumber = String(teamIndex + 1).padStart(2, "0");
        const teamLogo = escapeHtml(team.logo || "images/icon.png");
        const teamName = escapeHtml(team.name);
        const captainName = escapeHtml(getCaptainName(team));
        const averageRating = escapeHtml(calculateAverageRating(team));
        const teamKey = escapeHtml(team.key);
        const rosterCount = team.players.length;

        return `
          <section class="team team-panel ${teamKey}">
            <div class="team-head">
              <div class="team-identity">
                <div class="team-logo-shell">
                  <img src="${teamLogo}" alt="${teamName} logo" class="team-logo" onerror="this.onerror=null;this.src='images/icon.png';">
                </div>
                <div class="team-copy">
                  <p class="team-kicker">Team ${teamNumber} &bull; Tournament Squad</p>
                  <h2 class="team-title">
                    <span class="team-accent">${teamName}</span>
                  </h2>
                  <div class="h-1 w-24 team-line mt-5 rounded-full"></div>
                  <p class="team-summary">
                    Captain: <span class="team-accent">${captainName}</span>. 
                  </p>
                </div>
              </div>
              <div class="team-meta">
                <div class="team-meta-card">
                  <span class="team-meta-label">Кол-во игроков</span>
                  <span class="team-meta-value">${rosterCount}</span>
                </div>
                <div class="team-meta-card">
                  <span class="team-meta-label">Среднее K/D</span>
                  <span class="team-meta-value">${averageRating}</span>
                </div>
                <div class="team-meta-card">
                  <span class="team-meta-label">Код команды</span>
                  <span class="team-meta-value">${teamKey || "TEAM"}</span>
                </div>
              </div>
            </div>

            <div class="team-roster">
              ${team.players.map((player, playerIndex) => renderPlayerCard(team, player, playerIndex)).join("")}
            </div>
          </section>
        `;
      }

      async function initTeams() {
        teamsContainer.innerHTML = `
          <div class="text-center text-white/60 uppercase tracking-[0.3em] text-xs">
            Loading teams...
          </div>
        `;

        const [teamsResult, ratingsResult] = await Promise.allSettled([
          loadTeamsFromApi(),
          loadRatingsByPlayer()
        ]);

        if (teamsResult.status !== "fulfilled") {
          console.error("Failed to load teams:", teamsResult.reason);
          teamsContainer.innerHTML = `
            <div class="text-center text-white/60 uppercase tracking-[0.3em] text-xs">
              Failed to load teams
            </div>
          `;
          return;
        }

        if (ratingsResult.status !== "fulfilled") {
          console.error("Failed to load player ratings:", ratingsResult.reason);
        }

        const ratingsByPlayer = ratingsResult.status === "fulfilled" ? ratingsResult.value : {};
        const teams = applyRatingsToTeams(teamsResult.value, ratingsByPlayer);

        teamsContainer.innerHTML = teams.length
          ? teams.map(renderTeamSection).join("")
          : `
            <div class="text-center text-white/60 uppercase tracking-[0.3em] text-xs">
              No teams available
            </div>
          `;
      }

      initTeams();
    }());

    (function () {
      const authChip = document.getElementById("authChip");
      const authAvatar = document.getElementById("authAvatar");
      const authName = document.getElementById("authName");
      const loginNavButton = document.getElementById("loginNavButton");
      const logoutButton = document.getElementById("logoutButton");

      logoutButton.style.display = "none";

      function getDisplayName(user) {
        return user.global_name || user.username || user.name || "Discord User";
      }

      function getAvatarUrl(user) {
        if (!user || !user.id || !user.avatar) {
          return `https://cdn.discordapp.com/embed/avatars/${Math.floor(Math.random() * 5)}.png`;
        }

        const extension = String(user.avatar).startsWith("a_") ? "gif" : "png";
        return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${extension}?size=128`;
      }

      async function renderAuth() {
        try {
          const user = await window.__authPromise;
          if (user) {
            authName.textContent = getDisplayName(user);
            authAvatar.src = getAvatarUrl(user) || "images/icon.png";
            authAvatar.alt = `${getDisplayName(user)} avatar`;
            authChip.hidden = false;
            loginNavButton.hidden = true;
            logoutButton.style.display = IS_LOCAL_MODE ? "none" : "inline-flex";
          } else {
            authChip.hidden = true;
            loginNavButton.hidden = false;
            logoutButton.style.display = "none";
          }

          document.body.style.visibility = "visible";
        } catch (error) {
          console.error(error);
          authChip.hidden = true;
          loginNavButton.hidden = false;
          logoutButton.style.display = "none";
          document.body.style.visibility = "visible";
        }
      }

      async function logout() {
          if (IS_LOCAL_MODE) {
            return;
          }

          logoutButton.disabled = true;

          try {
            await fetch(`${AUTH_SERVER}/logout`, {
              method: "POST",
              credentials: "include",
              headers: buildAuthHeaders()
            });
          } finally {
            clearStoredAuth();
          }

          window.location.reload();
        }

      if (logoutButton) {
        logoutButton.addEventListener("click", logout);
      }

      renderAuth();
    }());
  </script>
