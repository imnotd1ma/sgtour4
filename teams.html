  <script>
    const AUTH_SERVER = "https://discord-auth-server-six.vercel.app";
    const AUTH_TOKEN_KEY = "sg-discord-token";
    const AUTH_USER_KEY = "sg-discord-user";
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyILFKyqrVxOQkwT2k9a_YGdSy0jb6-YsUwga3gC2ahD31u98jvv0VL5A99Rccnc-w/exec";
    const IS_LOCAL_MODE = ["localhost", "127.0.0.1"].includes(window.location.hostname) || window.location.protocol === "file:";
    const LOCAL_USER = {
      id: "local-dev-user",
      username: "LocalDev",
      global_name: "Local Dev",
      name: "Local Dev",
      avatar: ""
    };

    function readStoredAuthToken() {
      try {
        return localStorage.getItem(AUTH_TOKEN_KEY) || "";
      } catch (error) {
        console.warn("Unable to read auth token", error);
        return "";
      }
    }

    function persistAuthUser(user) {
      try {
        if (user) {
          localStorage.setItem(AUTH_USER_KEY, JSON.stringify(user));
        } else {
          localStorage.removeItem(AUTH_USER_KEY);
        }
      } catch (error) {
        console.warn("Unable to persist auth user", error);
      }
    }

    function clearStoredAuth() {
      try {
        localStorage.removeItem(AUTH_TOKEN_KEY);
        localStorage.removeItem(AUTH_USER_KEY);
      } catch (error) {
        console.warn("Unable to clear auth storage", error);
      }
    }

    function buildAuthHeaders() {
      const token = readStoredAuthToken();
      return token ? { Authorization: `Bearer ${token}` } : {};
    }

    window.__authPromise = IS_LOCAL_MODE ? Promise.resolve(LOCAL_USER) : fetch(`${AUTH_SERVER}/me`, {
      credentials: "include",
      headers: buildAuthHeaders()
    })
    .then(async (res) => {
      if (IS_LOCAL_MODE) {
        return res;
      }

      if (!res.ok) {
        if (res.status === 401 || res.status === 403) {
          clearStoredAuth();
        }
        window.location.href = "/sgtour4/login.html";
        throw new Error("Unauthorized");
      }

      return await res.json();
    })
    .then((user) => {
      window.__authUser = user;
      persistAuthUser(user);
      if (IS_LOCAL_MODE) {
        document.body.style.visibility = "visible";
      }
      return user;
    })
    .catch((err) => {
      console.error("Auth error:", err);
      if (IS_LOCAL_MODE) {
        document.body.style.visibility = "visible";
        return LOCAL_USER;
      }
      clearStoredAuth();
      window.location.href = "/sgtour4/login.html";
    })
    .catch(() => {
      document.body.style.visibility = "visible"; // на всякий случай
      window.location.href = "/sgtour4/login.html";
    });
  </script>

  <script>
    (function () {
      const teamsContainer = document.getElementById("teamsContainer");

      if (!teamsContainer) {
        return;
      }

      const DEFAULT_PLAYER_STATS = {
        rating: "0.00",
        playtime: "??? hrs",
        signature: "???"
      };

      // Edit team rosters here, similar to `matches` in live.html.
      const teams = [
        {
          key: "PV",
          name: "???",
          titleMain: "",
          titleAccent: "???",
          logo: "images/pv.png",
          players: [
            { name: "???", image: "images/imnotdima.png", role: "стреляет раз в год", rating: "0.00", playtime: "", signature: "" },
            { name: "???", image: "images/egor_lam.png", role: "ванёк лучший", rating: "0.00", playtime: "", signature: "" },
            { name: "???", image: "images/zeros.png", role: "", rating: "0.00", playtime: "", signature: "" },
            { name: "???", image: "images/ds_swanson.png", role: "", rating: "0.00", playtime: "", signature: "" }
          ]
        }
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalizePlayerName(value) {
        return String(value ?? "")
          .normalize("NFKD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^0-9a-zа-яё]+/gi, "")
          .toLowerCase();
      }

      function formatRating(value) {
        if (value === null || value === undefined || value === "") {
          return DEFAULT_PLAYER_STATS.rating;
        }

        const numericValue = Number(value);
        if (Number.isFinite(numericValue)) {
          return numericValue.toFixed(2);
        }

        const normalizedValue = String(value).trim();
        return normalizedValue || DEFAULT_PLAYER_STATS.rating;
      }

      async function fetchJson(url) {
        const response = await fetch(url, { method: "GET" });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        return await response.json();
      }

      async function loadRatingsByPlayer() {
        const data = await fetchJson(`${GOOGLE_SCRIPT_URL}?mode=ratings`);
        if (data?.status === "error") {
          throw new Error(data.error || "Failed to load ratings");
        }
        const rows = Array.isArray(data?.ratings) ? data.ratings : [];

        return rows.reduce((accumulator, row) => {
          const playerName = normalizePlayerName(row?.player);

          if (!playerName) {
            return accumulator;
          }

          accumulator[playerName] = formatRating(row?.average_rating);
          return accumulator;
        }, {});
      }

      function renderPlayerCard(team, player, playerIndex) {
        const animationDelay = `${(playerIndex * 0.12).toFixed(2)}s`;
        const imageSrc = escapeHtml(player.image || team.logo || "images/icon.png");
        const fallbackImage = escapeHtml(team.logo || "images/icon.png");
        const playerKey = escapeHtml(normalizePlayerName(player.name));
        const playerName = escapeHtml(player.name);
        const role = escapeHtml(player.role || "Player");
        const rating = escapeHtml(player.rating || DEFAULT_PLAYER_STATS.rating);
        const playtime = escapeHtml(player.playtime || DEFAULT_PLAYER_STATS.playtime);
        const signature = escapeHtml(player.signature || DEFAULT_PLAYER_STATS.signature);

        return `
          <div class="player-card rounded-3xl p-6 group animate__animated animate__fadeInUp${player.captain ? " captain-ring" : ""}" style="animation-delay: ${animationDelay};">
            <div class="relative overflow-hidden rounded-2xl mb-6">
              <img src="${imageSrc}" alt="${playerName}" class="w-full h-72 object-cover group-hover:scale-110 transition duration-700" onerror="this.onerror=null;this.src='${fallbackImage}';">
              ${player.captain ? '<div class="absolute top-4 right-4 badge-captain text-[10px] px-2 py-1 rounded font-black uppercase">Captain</div>' : ""}
              <div class="absolute bottom-0 left-0 right-0 role-bar p-4">
                <span class="text-[10px] font-black uppercase role-text">${role}</span>
              </div>
            </div>
            <h3 class="player-name text-3xl font-black mb-4 tracking-tight">${playerName}</h3>
            <div class="space-y-3 text-sm">
              <div class="flex justify-between stat-badge"><span class="text-gray-400">Rating 2.0</span><span class="font-semibold stat-value" data-player-rating="${playerKey}">${rating}</span></div>
              <div class="flex justify-between stat-badge"><span class="text-gray-400">Playtime</span><span class="font-mono stat-value">${playtime}</span></div>
              <div class="flex justify-between stat-badge"><span class="text-gray-400">Signature</span><span class="font-mono stat-value">${signature}</span></div>
            </div>
          </div>
        `;
      }

      function renderTeamSection(team, teamIndex) {
        const teamNumber = String(teamIndex + 1).padStart(2, "0");

        return `
          <section class="team ${escapeHtml(team.key)}">
            <div class="text-center mb-8">
              <p class="uppercase tracking-[0.45em] text-[10px]" style="color: var(--accent); text-shadow: 0 0 10px rgba(var(--accent-rgb)/0.5);">
                Team ${teamNumber} • Duo
              </p>
              <h2 class="mt-3 text-5xl font-black tracking-tighter team-glow">
                ${escapeHtml(team.titleMain)}<span class="team-accent">${escapeHtml(team.titleAccent)}</span>
              </h2>
              <div class="h-1 w-24 team-line mx-auto mt-4 rounded-full"></div>
            </div>

            <div class="team-roster">
              ${team.players.map((player, playerIndex) => renderPlayerCard(team, player, playerIndex)).join("")}
            </div>
          </section>
        `;
      }

      function updateRenderedRatings(ratingsByPlayer) {
        Object.entries(ratingsByPlayer).forEach(([playerKey, rating]) => {
          const ratingNodes = teamsContainer.querySelectorAll(`[data-player-rating="${playerKey}"]`);
          ratingNodes.forEach((node) => {
            node.textContent = rating;
          });
        });
      }

      async function hydrateRatings() {
        try {
          const ratingsByPlayer = await loadRatingsByPlayer();
          updateRenderedRatings(ratingsByPlayer);
        } catch (error) {
          console.error("Failed to load player ratings:", error);
        }
      }

      function initTeams() {
        teamsContainer.innerHTML = teams.map(renderTeamSection).join("");
        hydrateRatings();
      }

      initTeams();
    }());

    (function () {
      const authChip = document.getElementById("authChip");
      const authAvatar = document.getElementById("authAvatar");
      const authName = document.getElementById("authName");
      const logoutButton = document.getElementById("logoutButton");

      logoutButton.style.display = "none";

      function getDisplayName(user) {
        return user.global_name || user.username || user.name || "Discord User";
      }

      function getAvatarUrl(user) {
        if (!user || !user.id || !user.avatar) {
          return `https://cdn.discordapp.com/embed/avatars/${Math.floor(Math.random() * 5)}.png`;
        }

        const extension = String(user.avatar).startsWith("a_") ? "gif" : "png";
        return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${extension}?size=128`;
      }

      async function renderAuth() {
        try {
          const user = await window.__authPromise;
          if (!user) {
            return;
          }

          authName.textContent = getDisplayName(user);
          authAvatar.src = getAvatarUrl(user) || "images/icon.png";
          authAvatar.alt = `${getDisplayName(user)} avatar`;
          authChip.hidden = false;

          logoutButton.style.display = IS_LOCAL_MODE ? "none" : "inline-flex";

          document.body.style.visibility = "visible";

        } catch (error) {
          console.error(error);
        }
      }

      async function logout() {
          if (IS_LOCAL_MODE) {
            return;
          }

          logoutButton.disabled = true;

          try {
            await fetch(`${AUTH_SERVER}/logout`, {
              method: "POST",
              credentials: "include",
              headers: buildAuthHeaders()
            });
          } finally {
            clearStoredAuth();
          }

          window.location.href = "/sgtour4/login.html";
        }

      if (logoutButton) {
        logoutButton.addEventListener("click", logout);
      }

      renderAuth();
    }());
  </script>
  <script src="scripts/theme-switcher.js"></script>
</body>
</html>
